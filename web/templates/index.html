<!DOCTYPE html>
<html>
    <head>
        <title>ROAD EYE</title>
        <link rel="stylesheet" href="/static/css/style.css">
    </head>

    <body>
        <h1>ROAD EYE: OBJECT DETECTION AND CLASSIFICATION</h1>

        <h2>Upload Image</h2>

        <form id="uploadForm">
            <!--
            type="file" creates the file picker
            accept="image/*" restricts it to image files only
            The <img> tag is where you'll display the result
            -->
            <input type="file" id="fileInput" name="image" accept="image/*">
            <button type="button" onclick="uploadImage()">Upload</button>
        </form>

        <img id="result">

        <p id="response"></p>

        <script src="/static/js/script.js"></script>
    </body>
</html>
